version: 1

# Branding
extends:
  # choose between c3s.yml, cams.yml, and ecmwf.yml
  - branding/c3s.yml

project:
  title: ECMWF Training Template
  license: Apache-2.0
  open_access: true
  exclude:
    - developer/*
  github: ecmwf-training/jupyter-template
  thebe:
    binder:
      repo: ecmwf-training/jupyter-template
      provider: github
      url: https://mybinder.org
      ref: develop
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: README.md
    - file: template-notebook.ipynb
site:
  template: book-theme
  options:
    folders: true
